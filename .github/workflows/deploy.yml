name: Deploy Frontend + Backend (Docker)

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/novel/**"
      - "backend/novels/**"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------- Frontend (Vite) ----------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"

      - name: Build frontend
        working-directory: frontend/novel
        run: |
          npm ci
          npm run build

      # ---------- Backend (Spring Boot) ----------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      # gradlew 실행 권한 부여
      - name: Build backend
        working-directory: backend/novels
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      # ---------- Prepare artifacts ----------
      - name: Prepare artifacts
        run: |
          set -e  # 에러 발생 시 즉시 종료
          mkdir -p artifacts/frontend artifacts/backend

          # frontend dist
          cp -r frontend/novel/dist/* artifacts/frontend/

          # backend jar -> app.jar (plain.jar 제외)
          JAR_PATH=$(ls backend/novels/build/libs/*.jar | grep -v -- '-plain\.jar' | head -n 1)
          if [ -z "$JAR_PATH" ]; then
            echo "No runnable jar found in novels/backend/build/libs"
            ls -al backend/novels/build/libs || true
            exit 1
          fi

          cp "$JAR_PATH" artifacts/backend/app.jar
          cp backend/novels/Dockerfile artifacts/backend/Dockerfile
          cp backend/novels/docker-compose.yml artifacts/backend/docker-compose.yml

      # ---------- Deploy ----------
      - name: Install ssh + rsync
        run: sudo apt-get update && sudo apt-get install -y openssh-client rsync

      - name: Combined Deploy (Frontend + Backend)
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          PORT: ${{ secrets.SERVER_PORT }}
          USER: ${{ secrets.SERVER_USER }}
          FE_DIR: ${{ secrets.DEPLOY_FRONTEND_DIR }}
          BE_DIR: ${{ secrets.DEPLOY_BACKEND_DIR }}
        run: |
          # 1. SSH 키 설정
          mkdir -p ~/.ssh
          rm -f ~/.ssh/cm-* # 기존에 남아있을지 모르는 연결 소켓 삭제
          cat << 'EOF' > ./private_key
          ${{ secrets.SERVER_SSH_RSA }}
          EOF
          chmod 600 ./private_key

          # 2. 공통 SSH 옵션 설정 (재사용을 위한 소켓 설정 포함)
          # ControlMaster를 쓰면 첫 연결 이후는 세션 생성 생략 가능 (속도 개선)
          SSH_OPTS="-p $PORT -i ./private_key -o StrictHostKeyChecking=no -o ControlMaster=auto -o ControlPath=~/.ssh/cm-%r@%h:%p -o ControlPersist=60s"

          # 3. 데이터 전송 (rsync 연달아 실행)
          echo ">>> 전송 시작: Frontend"
          rsync -avz --delete -e "ssh $SSH_OPTS" artifacts/frontend/ $USER@$HOST:$FE_DIR/

          echo ">>> 전송 시작: Backend"
          rsync -avz --delete -e "ssh $SSH_OPTS" artifacts/backend/ $USER@$HOST:$BE_DIR/

          # 4. 서버 원격 명령 실행 (Docker 및 Nginx)
          echo ">>> 서버 리스타트 및 설정 적용"
          ssh $SSH_OPTS $USER@$HOST "bash -lc '
            cd $BE_DIR

            export OPENAI_API_KEY=\"${{ secrets.OPENAI_API_KEY }}\"
            export MYSQL_ROOT_PASSWORD=\"${{ secrets.MYSQL_ROOT_PASSWORD }}\"
            export MYSQL_PASSWORD=\"${{ secrets.MYSQL_PASSWORD }}\"
            
            # 컨테이너 갱신
            docker compose up -d --build
            docker image prune -f
            
            # Nginx 리로드 (정적 파일 및 프록시 설정 반영)
            sudo systemctl reload nginx
          '"

          # 5. 보안을 위해 키 삭제
          rm ./private_key
          rm -f ~/.ssh/cm-*
